<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodri & Caio - Boda</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #212529;
            font-family: 'Press Start 2P', monospace;
            padding: 15px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 11px;
            color: #212529;
        }

        .game-container {
            max-width: 400px;
            width: 100%;
            min-height: 550px;
            background-color: #ffffff; /* Empieza en blanco */
            padding: 25px 20px;
            border-radius: 4px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            /* Corregido: Se fuerza a que el fondo se adapte al 100% sin recortes/zoom */
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            flex-grow: 1;
            z-index: 2;
        }

        .screen.active {
            display: flex;
        }

        /* --- CINEMÁTICA DE INTRODUCCIÓN --- */
        #screen-intro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .panorama-viewer {
            width: 100%;
            height: 100%;
            background-image: url('BGintro.jpg');
            background-size: auto 100%; /* Asegura que se vea el alto completo de la intro */
            background-repeat: no-repeat;
            opacity: 0;
            animation: introCinematica 8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes introCinematica {
            0% { opacity: 0; background-position: 100% center; }
            10% { opacity: 1; background-position: 100% center; }
            30% { background-position: 100% center; }
            40% { background-position: 50% center; }
            65% { background-position: 50% center; }
            75% { background-position: 0% center; opacity: 1; }
            90% { background-position: 0% center; opacity: 1; }
            100% { background-position: 0% center; opacity: 0; }
        }

        /* --- PANTALLA INICIAL (MARIO STYLE) --- */
        .title-box {
            text-align: center;
            background-color: rgba(33, 37, 41, 0.9) !important;
            margin-bottom: 50px;
            padding: 20px 10px !important;
            opacity: 0;
            transition: opacity 0.8s ease-out;
            z-index: 4;
        }

        .title-box h1 {
            font-size: 15px;
            line-height: 1.8;
            margin: 0;
            color: #f7d51d;
            text-shadow: 2px 2px #b01e23;
        }

        .title-box h1 i {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-style: italic;
            font-weight: 900;
            letter-spacing: 2px;
            display: block;
            margin-top: 5px;
            font-size: 20px;
            color: #ff007f; 
            text-shadow: 2px 2px #00f0ff; 
            transform: skewX(-15deg); 
        }

        /* DONA FLOR: Capa corregida adelante con z-index alto */
        #flor-character {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: auto;
            image-rendering: pixelated;
            opacity: 0;
            filter: blur(15px);
            transition: opacity 0.8s ease-out, filter 0.8s ease-out;
            z-index: 5; /* Asegura ir por delante de cualquier fondo y del layout */
        }

        .lang-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            opacity: 0;
            transition: opacity 0.8s ease-out;
            z-index: 6;
        }

        /* --- HOMEPAGE (4 FOTOS) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .menu-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: 4px solid #212529;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: #212529 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .menu-card:hover {
            transform: scale(1.04);
            border-color: #f7d51d;
            background-color: #ffffff;
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 2px solid #212529;
            margin-bottom: 8px;
            image-rendering: pixelated; 
        }

        .menu-card span {
            font-size: 8px;
            line-height: 1.4;
            display: block;
            margin-top: auto;
            font-weight: bold;
        }

        .welcome-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border: 3px double #212529;
            border-radius: 4px;
            font-size: 9px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container nes-container is-rounded" id="main-container">

    <div id="screen-intro">
        <div class="panorama-viewer"></div>
    </div>

    <div id="screen-start" class="screen active">
        <div class="title-box nes-container is-rounded is-dark" id="main-logo">
            <h1>RODRI & CAIO's <i>Big Adventure</i></h1>
        </div>

        <img src="FlorYas.png" alt="Dona Flor" id="flor-character">
        
        <div class="lang-container" id="main-buttons">
            <button class="nes-btn is-primary" onclick="selectLanguage('es')">[ ESPAÑOL (ARG) ]</button>
            <button class="nes-btn is-success" onclick="selectLanguage('pt')">[ PORTUGUÊS (BR) ]</button>
            <button class="nes-btn is-warning" onclick="selectLanguage('en')">[ ENGLISH ]</button>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="welcome-box" id="lbl-welcome"></div>

        <div class="menu-grid">
            <a href="https://rh2bo.github.io/Rodri-CaioStheD/index.html" class="menu-card">
                <img src="foto-save.png" alt="Save the Date">
                <span id="lbl-save">SAVE THE DATE</span>
            </a>

            <a href="https://rh2bo.github.io/Rodri-CaioRSVP/" class="menu-card">
                <img src="foto-rsvp.png" alt="RSVP">
                <span id="lbl-rsvp">RSVP</span>
            </a>

            <a href="Informacoes.pdf" target="_blank" class="menu-card">
                <img src="foto-info.png" alt="Informaciones">
                <span id="lbl-info">INFORMACIONES</span>
            </a>

            <a href="https://rh2bo.github.io/Rodri-CaioGifts/" class="menu-card">
                <img src="foto-regalos.png" alt="Regalos">
                <span id="lbl-gifts">PRESENTES</span>
            </a>
        </div>
    </div>

</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const introScreen = document.getElementById('screen-intro');
        const container = document.getElementById('main-container');
        const logo = document.getElementById('main-logo');
        const flor = document.getElementById('flor-character');
        const buttons = document.getElementById('main-buttons');

        // 1. Esperamos los 8 segundos del panorama animado
        setTimeout(() => {
            introScreen.style.display = 'none';
            container.style.backgroundImage = "url('RioBG.png')";
            
            // 2. Aparece el logo
            setTimeout(() => {
                logo.style.opacity = '1';
                
                // 3. Aparece Flor (Blur in desde desenfoque)
                setTimeout(() => {
                    flor.style.opacity = '1';
                    flor.style.filter = 'blur(0px)';
                    
                    // 4. Por último, entran los botones de idioma
                    setTimeout(() => {
                        buttons.style.opacity = '1';
                    }, 900);

                }, 800);

            }, 400);

        }, 8000); 
    });

    const i18n = {
        es: {
            welcome: "¡SELECCIONÁ UNA OPCIÓN!",
            save: "SAVE THE DATE",
            rsvp: "RSVP (CONFIRMAR)",
            info: "INFORMACIÓN",
            gifts: "REGALOS"
        },
        pt: {
            welcome: "SELECIONE UMA OPÇÃO!",
            save: "SAVE THE DATE",
            rsvp: "RSVP (CONFIRMAR)",
            info: "INFORMAÇÕES",
            gifts: "PRESENTES"
        },
        en: {
            welcome: "CHOOSE AN OPTION!",
            save: "SAVE THE DATE",
            rsvp: "RSVP (CONFIRM)",
            info: "INFORMATION",
            gifts: "GIFTS"
        }
    };

    function selectLanguage(lang) {
        const t = i18n[lang];
        
        document.getElementById('lbl-welcome').innerText = t.welcome;
        document.getElementById('lbl-save').innerText = t.save;
        document.getElementById('lbl-rsvp').innerText = t.rsvp;
        document.getElementById('lbl-info').innerText = t.info;
        document.getElementById('lbl-gifts').innerText = t.gifts;

        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-home').classList.add('active');
    }
</script>
</body>
</html>
