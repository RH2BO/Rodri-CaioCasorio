<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodri & Caio's Big Adventure!</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #212529;
            font-family: 'Press Start 2P', monospace;
            padding: 15px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 11px;
            color: #212529;
        }

        .game-container {
            max-width: 400px;
            width: 100%;
            min-height: 550px;
            padding: 25px 20px;
            border-radius: 4px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            
            background-image: url('BGintro.jpg');
            background-size: auto 100%; 
            background-position: 0% center; 
            background-repeat: no-repeat;
            transition: background 0.3s ease;
        }

        /* Cambia el fondo a terminal de espías cuando entra a informaciones */
        .game-container.carmen-mode {
            background-image: none !important;
            background-color: #0b1015 !important;
            border: 4px solid #3f51b5 !important;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            flex-grow: 1;
            z-index: 2;
        }

        .screen.active {
            display: flex;
        }

        /* --- BOTÓN RETRO DE AUDIO --- */
        #audio-control {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 15; 
            padding: 6px 10px;
            font-size: 14px; 
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CAPA DE INTRODUCCIÓN CINEMÁTICA --- */
        #screen-intro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease-in-out;
        }

        .panorama-viewer {
            width: 100%;
            height: 100%;
            background-image: url('BGintro.jpg');
            background-size: auto 100%; 
            background-repeat: no-repeat;
            opacity: 0;
            animation: introCinematica 9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes introCinematica {
            0% { opacity: 0; background-position: 100% center; transform: translateX(0); }
            5% { opacity: 1; background-position: 100% center; transform: translateX(0); }
            25% { background-position: 100% center; transform: translateX(0); }
            27% { transform: translateX(-3px); }
            29% { transform: translateX(3px); }
            31% { transform: translateX(-3px); }
            32% { background-position: 100% center; transform: translateX(0); }
            40% { background-position: 50% center; transform: translateX(0); }
            58% { background-position: 50% center; transform: translateX(0); }
            60% { transform: translateX(-3px); }
            62% { transform: translateX(3px); }
            64% { transform: translateX(-3px); }
            65% { background-position: 50% center; transform: translateX(0); }
            73% { background-position: 0% center; transform: translateX(0); }
            100% { background-position: 0% center; opacity: 1; transform: translateX(0); }
        }

        /* --- PANTALLA INICIAL --- */
        .title-box {
            text-align: center;
            background-color: rgba(33, 37, 41, 0.9) !important;
            margin-bottom: 50px;
            padding: 20px 10px !important;
            opacity: 0;
            transition: opacity 0.8s ease-out;
            z-index: 4;
        }

        .title-box h1 {
            font-size: 15px;
            line-height: 1.8;
            margin: 0;
            color: #f7d51d;
            text-shadow: 2px 2px #b01e23;
        }

        .title-box h1 i {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-style: italic;
            font-weight: 900;
            letter-spacing: 2px;
            display: block;
            margin-top: 5px;
            font-size: 20px;
            color: #ff007f; 
            text-shadow: 2px 2px #00f0ff; 
            transform: skewX(-15deg); 
        }

        #flor-character {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: auto;
            image-rendering: pixelated;
            opacity: 0;
            filter: blur(15px);
            transition: opacity 0.8s ease-out, filter 0.8s ease-out;
            z-index: 5; 
        }

        .lang-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            opacity: 0;
            transition: opacity 0.8s ease-out;
            z-index: 6;
        }

        /* --- HOMEPAGE (4 FOTOS) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .menu-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: 4px solid #212529;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: #212529 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .menu-card:hover {
            transform: scale(1.04);
            border-color: #f7d51d;
            background-color: #ffffff;
        }

        .menu-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 2px solid #212529;
            margin-bottom: 8px;
            image-rendering: pixelated; 
        }

        .menu-card span {
            font-size: 8px;
            line-height: 1.4;
            display: block;
            margin-top: auto;
            font-weight: bold;
        }

        .welcome-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border: 3px double #212529;
            border-radius: 4px;
            font-size: 9px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* --- PANTALLA ESTILO CARMEN SANDIEGO --- */
        .carmen-title {
            color: #00ff66;
            text-align: center;
            font-size: 10px;
            margin-bottom: 15px;
            text-shadow: 0 0 4px #00ff66;
        }

        .carmen-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .carmen-btn {
            font-size: 8px !important;
            text-align: left !important;
        }

        .dossier-panel {
            background-color: #141d26;
            border: 2px solid #00ff66;
            padding: 12px;
            color: #ffffff;
            height: 250px;
            overflow-y: auto;
            font-size: 9px;
            line-height: 1.6;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,255,102,0.2);
        }

        /* Scrollbar retro de la terminal */
        .dossier-panel::-webkit-scrollbar { width: 6px; }
        .dossier-panel::-webkit-scrollbar-track { background: #141d26; }
        .dossier-panel::-webkit-scrollbar-thumb { background: #00ff66; }

        .dossier-panel h3 {
            color: #f7d51d;
            font-size: 10px;
            margin-top: 14px;
            margin-bottom: 6px;
            border-bottom: 1px dashed #00ff66;
            padding-bottom: 2px;
        }

        .dossier-panel p, .dossier-panel ul {
            margin: 0 0 10px 0;
            padding-left: 0;
        }

        .dossier-panel ul { list-style: none; }
        .dossier-panel li { margin-bottom: 8px; position: relative; padding-left: 12px;}
        .dossier-panel li::before { content: ">"; position: absolute; left: 0; color: #00ff66; }

        .dossier-panel a {
            color: #00ffff;
            text-decoration: underline;
            word-break: break-all;
            font-size: 8px;
            display: inline-block;
            margin-top: 2px;
        }

        .btn-back-container {
            margin-top: auto;
        }
    </style>
</head>

            <!-- Se llena dinámicamente con JS -->

        </div>

                btnAudio.classList.add('is-success');

    function selectLanguage(lang) {
        currentLang = lang;
        if (miMusica.paused) { toggleMúsica(); }

        const t = i18n[lang];
        document.getElementById('lbl-welcome').innerText = t.welcome;
        document.getElementById('lbl-save').innerText = t.save;
        document.getElementById('lbl-rsvp').innerText = t.rsvp;
        document.getElementById('lbl-info').innerText = t.info;
        document.getElementById('lbl-gifts').innerText = t.gifts;

        // Traducir los elementos estáticos de la pantalla de información
        document.getElementById('info-terminal-title').innerText = t.terminal;
        document.getElementById('btn-sub-evento').innerText = t.subEvento;
        document.getElementById('btn-sub-quests').innerText = t.subQuests;
        document.getElementById('btn-info-back').innerText = t.back;

        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-home').classList.add('active');
    }

    function openInformaciones() {
        document.getElementById('main-container').classList.add('carmen-mode');
        document.getElementById('screen-home').classList.remove('active');
        document.getElementById('screen-info-page').classList.add('active');
        
        // Carga por defecto el prompt inicial o directamente el evento
        showDossier('evento');
    }

    function closeInformaciones() {
        document.getElementById('main-container').classList.remove('carmen-mode');
        document.getElementById('screen-info-page').classList.remove('active');
        document.getElementById('screen-home').classList.add('active');
    }

    function showDossier(type) {
        const contentPanel = document.getElementById('dossier-content');
        // Efecto rápido de "limpieza" simulando carga de pantalla CRT
        contentPanel.innerHTML = "LOADING DATA...";
        
        setTimeout(() => {
            contentPanel.innerHTML = dossierData[currentLang][type];
            contentPanel.scrollTop = 0; // Vuelve arriba el scroll del dossier
        }, 150);
    }
</script>
